name: E2E Tests

on:
  push:
    branches: [main, dev, "feature/**"]
    paths:
      - "e2e/**"
      - "frontend/**"
      - "backend/**"
      - ".github/workflows/e2e-test.yaml"
  pull_request:
    branches: [main, dev]
    paths:
      - "e2e/**"
      - "frontend/**"
      - "backend/**"
      - ".github/workflows/e2e-test.yaml"
  workflow_dispatch:

jobs:
  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      CI: true
      E2E_CONNECTION_STRING: ${{ secrets.E2E_CONNECTION_STRING }}
      E2E_BACKEND_URL: http://localhost:5233
      E2E_FRONTEND_URL: http://localhost:3000

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Verify database connection string
        run: |
          if [ -z "$E2E_CONNECTION_STRING" ]; then
            echo "E2E_CONNECTION_STRING secret is not configured in the repository."
            exit 1
          fi

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: |
            frontend/package-lock.json
            e2e/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Install Playwright dependencies
        working-directory: e2e
        run: npm ci

      - name: Install Playwright browsers
        working-directory: e2e
        run: npx playwright install chromium --with-deps

      - name: Run E2E tests
        working-directory: e2e
        run: npm test

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: e2e/playwright-report/
          retention-days: 7
