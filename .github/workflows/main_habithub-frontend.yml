name: Build and deploy Node.js app to Azure Web App - habithub-frontend

on:
  push:
    branches:
      - main
      - 'feature/**'
    paths:
      - 'frontend/**'
      - '.github/workflows/**'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js app
        run: npm run build

      - name: Prepare standalone package
        run: |
          mkdir deploy
          cp -r .next/standalone/* deploy/
          mkdir -p deploy/.next
          cp -r .next/static deploy/.next/static
          if [ -d public ]; then cp -r public deploy/public; fi

      - name: Deploy to Azure
        uses: azure/webapps-deploy@v3
        with:
          app-name: habithub-frontend
          package: frontend/deploy